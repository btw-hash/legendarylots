<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>Legendary Lots — Колесо розіграшів</title>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="/logo.png" alt="Legendary Lots" />
        <div class="brand-text">
          <h1>Legendary Lots</h1>
          <span class="tagline">Колесо розіграшів</span>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="btn-sound" class="btn icon" title="Звук" aria-label="Звук">🔊</button>
        <div id="save-pill" class="save-pill hidden" title="Натисни — скопіює посилання на це колесо">
          <span class="save-dot" aria-hidden="true"></span>
          <span class="save-pill-hint">копіювати посилання</span>
        </div>
        <button id="btn-new" class="btn" title="Почати нове колесо">➕ Нове</button>
        <button id="btn-guest-link" class="btn" title="Гостьове посилання для глядачів">🔗 Гості</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel" id="panel">
        <input
          id="wheel-name"
          class="wheel-name"
          maxlength="60"
          placeholder="Назва колеса"
          autocomplete="off"
          spellcheck="false"
        />

        <section class="pane">
          <input
            id="entry-input"
            class="entry-input"
            placeholder="Новий варіант — натисни Enter"
            autocomplete="off"
            spellcheck="false"
          />
          <div id="dropzone" class="dropzone">
            <div class="dropzone-icon">🖼️</div>
            <div>Додати фото — перетягни або натисни</div>
          </div>
          <input id="file-input" type="file" multiple accept="image/*" hidden />
          <div id="thumbs" class="thumbs"></div>
          <div class="pane-row">
            <div class="hint" id="entry-hint">0 варіантів</div>
            <button id="btn-clear-all" class="btn ghost small hidden">Очистити все</button>
          </div>
        </section>

        <section id="played-box" class="played-box hidden">
          <div class="played-head">
            <span class="played-title">Розіграні <span id="played-count">0</span></span>
            <button id="btn-return-all" class="btn ghost small">Повернути всі</button>
          </div>
          <div id="played-list" class="played-list"></div>
        </section>

        <footer class="panel-foot">
          <button id="btn-save" class="btn gold full">💾 Зберегти</button>
          <button id="btn-my-wheels" class="btn ghost small full">🎡 Мої прокрути</button>
          <div id="my-wheels" class="my-wheels hidden"></div>
        </footer>
      </aside>

      <section class="arena">
        <div class="wheel-wrap" id="wheel-wrap">
          <canvas id="wheel"></canvas>
        </div>
        <button id="btn-spin" class="btn spin-btn" disabled>Крутити!</button>
      </section>
    </main>

    <button id="btn-panel-toggle" class="btn panel-toggle">⚙ Налаштування</button>

    <div id="preview" class="preview hidden">
      <img id="preview-img" alt="" />
      <div id="preview-label" class="preview-label"></div>
    </div>

    <div id="winner-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-card">
        <img class="modal-gavel" src="/logo.png" alt="" />
        <div class="modal-eyebrow">Переможець!</div>
        <div id="winner-content" class="winner-content"></div>
        <div class="modal-actions">
          <button id="btn-remove-winner" class="btn ghost">Прибрати з колеса →</button>
          <button id="btn-close-winner" class="btn gold">Готово</button>
        </div>
      </div>
    </div>

    <!-- Guest contribution (stream viewers) -->
    <button id="btn-guest-add" class="btn gold guest-add hidden">➕ Додати свій варіант</button>

    <div id="guest-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-card guest-card">
        <div class="modal-eyebrow">Ваш варіант</div>
        <input id="guest-name" class="guest-input" maxlength="40" placeholder="Твоє ім'я (необов'язково)" autocomplete="off" />
        <input id="guest-input" class="guest-input" maxlength="60" placeholder="Напиши свій варіант…" autocomplete="off" />
        <div class="guest-or">або</div>
        <button id="btn-guest-image" class="btn ghost full">🖼️ Обрати зображення</button>
        <input id="guest-file" type="file" accept="image/*" hidden />
        <div id="guest-preview" class="guest-preview hidden"><img id="guest-preview-img" alt="" /></div>
        <div id="guest-msg" class="guest-msg"></div>
        <div class="modal-actions">
          <button id="btn-guest-cancel" class="btn ghost">Скасувати</button>
          <button id="btn-guest-submit" class="btn gold">Надіслати</button>
        </div>
      </div>
    </div>

    <!-- Host moderation: a non-blocking side card that hangs on the right until
         the host decides. No backdrop — the rest of the UI stays usable. -->
    <div id="mod-modal" class="mod-side hidden">
      <div class="modal-card mod-card">
        <div class="modal-eyebrow">Варіант від глядача</div>
        <div id="mod-content" class="mod-content"></div>
        <div class="modal-actions">
          <button id="btn-mod-reject" class="btn ghost">Відхилити</button>
          <button id="btn-mod-approve" class="btn gold">Додати</button>
        </div>
      </div>
    </div>

    <!-- Guests panel: the live queue of everything viewers submit, opened from
         the "Гості" button. Approve/reject each right here. -->
    <div id="guest-panel" class="guest-panel hidden">
      <div class="gp-head">
        <span class="gp-title">Гості онлайн</span>
        <button id="btn-guest-close" class="btn ghost small">✕</button>
      </div>
      <button id="btn-guest-copy" class="btn ghost small full">🔗 Скопіювати посилання</button>
      <div id="guest-queue" class="guest-queue"></div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
